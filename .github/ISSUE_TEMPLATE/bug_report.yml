name: Bug report
description: Report a layout, script, compatibility, or repository bug in the cleaned Sui workspace
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include the command that failed and the relevant output.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Failing command
      placeholder: cargo check
  - type: textarea
    id: output
    attributes:
      label: Error output
      render: text
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows GNU / MSYS2
        - Windows MSVC
        - Linux
        - macOS
        - GitHub Actions
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mention local changes, build scripts, or repair commands that were run.
