name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  layout:
    name: Layout and metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check cleaned layout
        run: cargo xtask check-layout
      - name: Print status
        run: cargo xtask status

  check-linux:
    name: Cargo check Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check

  check-windows-gnu:
    name: Cargo check Windows GNU
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            make
            diffutils
            pkgconf
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Repair Windows build environment
        shell: pwsh
        run: scripts\repair-windows.bat
      - name: Cargo check
        shell: pwsh
        run: scripts\check.bat fast
