name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  layout:
    name: Layout and metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check cleaned layout
        run: cargo xtask check-layout
      - name: Print status
        run: cargo xtask status

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all --check

  check-linux:
    name: Cargo check Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libbz2-dev \
            libclang-dev \
            libsnappy-dev \
            libzstd-dev \
            llvm-dev \
            pkg-config \
            zlib1g-dev

      - name: Configure libclang
        shell: bash
        run: |
          LLVM_LIBDIR="$(llvm-config --libdir)"
          echo "LIBCLANG_PATH=${LLVM_LIBDIR}" >> "$GITHUB_ENV"
          echo "CLANG_PATH=$(command -v clang)" >> "$GITHUB_ENV"
          echo "llvm-config --libdir: ${LLVM_LIBDIR}"
          ldconfig -p | grep libclang || true
          find /usr/lib -name 'libclang.so*' -print || true

      - name: Cargo check
        run: cargo check

  check-windows-gnu:
    name: Cargo check Windows GNU
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            diffutils
            make
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-pkgconf
            pkgconf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Configure Windows GNU libclang
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $roots = @(
            "C:\msys64\mingw64\bin",
            "C:\msys64\ucrt64\bin",
            "C:\msys64\clang64\bin",
            "C:\msys64\usr\bin",
            "C:\Program Files\LLVM\bin"
          ) | Where-Object { Test-Path $_ }

          Write-Host "candidate tool directories:"
          $roots | ForEach-Object { Write-Host "  $_" }

          $libclang = $null
          foreach ($dir in $roots) {
            $hit = Get-ChildItem -Path $dir -Filter "libclang*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($hit) { $libclang = $hit.FullName; break }
          }
          if (-not $libclang) {
            Write-Host "Installed MSYS2 packages:"
            if (Test-Path "C:\msys64\usr\bin\pacman.exe") {
              & "C:\msys64\usr\bin\pacman.exe" -Qs clang | Out-String | Write-Host
            }
            throw "Unable to find libclang*.dll in MSYS2/LLVM tool directories"
          }

          $clang = $null
          foreach ($dir in $roots) {
            $hit = Get-ChildItem -Path $dir -Filter "clang*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '^clang(-[0-9]+)?\.exe$' } |
              Select-Object -First 1
            if ($hit) { $clang = $hit.FullName; break }
          }

          $libclangDir = Split-Path $libclang -Parent
          $usrBin = "C:\msys64\usr\bin"
          $libclangDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          if (Test-Path $usrBin) { $usrBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append }

          "MSYS2_ROOT=C:\msys64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBCLANG_PATH=$libclangDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($clang) { "CLANG_PATH=$clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append }
          "BINDGEN_EXTRA_CLANG_ARGS_x86_64_pc_windows_gnu=--target=x86_64-w64-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BINDGEN_EXTRA_CLANG_ARGS_x86_64-pc-windows-gnu=--target=x86_64-w64-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXXFLAGS_x86_64_pc_windows_gnu=-include cstdint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXXFLAGS_x86_64-pc-windows-gnu=-include cstdint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "libclang: $libclang"
          if ($clang) {
            Write-Host "clang:    $clang"
            & $clang --version
          } else {
            Write-Host "clang executable was not found, but libclang is available for bindgen."
          }

      - name: Repair Windows build environment
        shell: pwsh
        run: scripts\repair-windows.bat

      - name: Cargo check
        shell: pwsh
        run: scripts\check.bat fast
