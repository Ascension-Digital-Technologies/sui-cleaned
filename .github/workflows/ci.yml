name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  layout:
    name: Layout and metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Static layout check
        run: python scripts/check-layout.py
      - name: Cargo layout check
        run: cargo xtask check-layout
      - name: Print status
        run: cargo xtask status

  check-linux:
    name: Cargo check Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install native dependencies
        run: sh scripts/setup-linux.sh
      - name: Cargo check
        run: sh scripts/check.sh fast

  check-windows-gnu:
    name: Cargo check Windows GNU
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            diffutils
            make
            pkgconf
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-snappy
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Repair Windows build environment
        shell: pwsh
        run: scripts\repair-windows.bat

      - name: Cargo check
        shell: pwsh
        run: scripts\check.bat fast
